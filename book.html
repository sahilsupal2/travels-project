    <section class="book1">
      <article>
      <div class="book-box">
        <h2>Trip Details</h2>
        <form action="">
          <label for="dest">Where do you want to go?</label>

          <!-- <input type="text" name="" id="dest" placeholder="Select Your Destination"> -->
           <select name="" id="dest" required>
            <option value="" disabled selected>Select a destination or tour...</option>
            <option value="Hampi">Hampi, Karnataka</option>
            <option value="Mahabalipuram">Mahabalipuram, Tamil Nadu</option>
            <option value="Amer Fort">Amer Fort, Rajasthan</option>
           </select>

          <label for="depart">Departure Date</label>

          <input type="date" name="" id="depart" placeholder="">

          <label for="return">Return Date</label>

          <input type="date" name="" id="return" placeholder="">

        </form>
      </div>
      <div class="book-box">
        <h2>Personal Information</h2>

        <form action="">
          <label for="name">Full Name</label>

          <input type="text" name="" id="name" placeholder="your name">

          <label for="email">Email Address</label>

          <input type="email" name="" id="email" placeholder="name@gmail.com">

          <label for="num">Phone Number</label>

          <input type="tel" name="" id="num" placeholder="+(91) 0000000000">

          <button type="button" class="book-btn">Confirm Booking</button>

        </form>
      </div>
      </article>
    </section>
